# Bug Bounty Intelligence Sources — Machine-Readable Catalog
#
# Schema (each list entry):
#   id          unique slug, kebab-case
#   name        human-readable
#   url         primary feed/url
#   connector   one of: rss_generic | youtube_channel | github_repo | cve_kev | wechat_rss | cn_forum
#   cadence     5-field cron, defaults handled per-connector
#   density     H | M | L
#   region      en | cn | jp | kr | sea | web3 | ai | global
#   tags        inline list e.g. [oauth, recon]
#   enabled     true|false (default true)
#
# Connector-specific extras:
#   github_repo:    repo (owner/name), feed (commits|releases|tags), branch
#   cve_kev:        feed (nvd_recent|cisa_kev|osv|zdi), days, ecosystem, limit
#   youtube_channel: channel_id (preferred over url)
#   wechat_rss:     biz (wechat biz id, documentation only)
#   cn_forum:       flavour (discuz|discourse|rss)
#
# Loader: apps/grok-kb-agent-suite/backend/connectors/base.py::load_sources_yaml
# Strict subset of YAML — keep one key per line, no nested mappings.

